<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin-top: 60px;
            padding: 30px;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .prediction {
            font-size: 1.3rem;
            color: #198754;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">Car Price Prediction</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger" role="alert">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/predict">
            <div class="mb-3">
                <label class="form-label">Year</label>
                <input type="number" class="form-control" name="year" min="1990" max="2025" placeholder="e.g. 2015" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Kilometers Driven</label>
                <input type="number" class="form-control" name="km_driven" min="0" placeholder="e.g. 45000" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Fuel Type</label>
                <select class="form-select" name="fuel" required>
                    <option value="0">Petrol</option>
                    <option value="1">Diesel</option>
                    <option value="2">CNG</option>
                    <option value="3">LPG</option>
                    <option value="4">Electric</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Seller Type</label>
                <select class="form-select" name="seller_type" required>
                    <option value="0">Dealer</option>
                    <option value="1">Individual</option>
                    <option value="2">Trustmark Dealer</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Transmission</label>
                <select class="form-select" name="transmission" required>
                    <option value="0">Manual</option>
                    <option value="1">Automatic</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Owner</label>
                <select class="form-select" name="owner" required>
                    <option value="0">First Owner</option>
                    <option value="1">Second Owner</option>
                    <option value="2">Third Owner</option>
                    <option value="3">Fourth & Above Owner</option>
                    <option value="4">Test Drive Car</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Predict Price</button>
        </form>

        {% if prediction_text %}
            <div class="prediction mt-4">
                {{ prediction_text }}
            </div>
        {% endif %}
    </div>
</body>
</html>
